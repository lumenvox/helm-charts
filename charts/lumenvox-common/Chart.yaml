apiVersion: v2
name: lumenvox-common
description: LumenVox Common Components Helm chart for Kubernetes
type: application
version: 7.1.0
appVersion: "7.1.0"
home: https://lumenvox.com
annotations:
  artifacthub.io/containsSecurityUpdates: true
  artifacthub.io/images: |
    - name: admin-portal
      image: lumenvox/admin-portal:7.1
    - name: archive
      image: lumenvox/archive:7.1
    - name: binary-storage
      image: lumenvox/storage:7.1
    - name: cloud-init-tools
      image: lumenvox/cloud-init-tools:7.1
    - name: configuration
      image: lumenvox/configuration:7.1
    - name: deployment
      image: lumenvox/deployment:7.1
    - name: deployment-portal
      image: lumenvox/deployment-portal:7.1
    - name: license
      image: lumenvox/license:7.1
    - name: management-api
      image: lumenvox/management-api:7.1
    - name: resource
      image: lumenvox/resource:7.1
    - name: file-store
      image: lumenvox/file-store:7.1
